<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navigation bar variation</title>
</head>
<style>
    body{
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        margin: 0px;
        padding: 30px;
        background-color:#1a1a1a
    }
    .nav-container{
        margin-bottom: 40px;
    }
    h2{
        margin-bottom:10px;
    }
    .nav1{
        border:2px solid red;
        background-color: #f8f9fa;
        padding:10px;
    }
    .nav1 ul{
        list-style-type: none;
        display: flex;
        justify-content: space-around;
        margin: 0px;
        padding: 5px;

    }
    .nav1 li{
        display: inline;
    }
    .nav1 a{
text-decoration:none;
background-color: orangered;
padding: 5px 20px;
border-color: black;
border-radius: 5px;
}
.nav1 .login-btn{
    background-color: hsl(0, 58%, 57%);
    color: #000000;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-weight: 100;
    font-style: italic;
    padding: 5px 20px;
    border-radius: 5px;
}
</style>
<body>
    <div class="nav-container">
        <h2>varitaion 1:horizantle with underline effect</h2>
<nav class="nav1">
    <ul>
        <li><a href="#">home</a></li>
        <li><a href="#">about us</a></li>
        <li><a href="#">produts</a></li>
       <li>
        <button class="login-btn">login</button>
       </li>
    </ul>
</nav>
    </div>
</body>
</html>
