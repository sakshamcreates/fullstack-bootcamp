<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student registration form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <h2>please enter your credentials</h2>
    <form>
        <div>
            
            <label for="text">
                <b>your name:</b>
                <input type="text" placeholder="your name here "  required>
            </label>
        </div>
        <br>
        <div>

            <label for="text">
                username:
                <input type="text" placeholder="username" required>
            </label>
        </div>
        <br>
        <div>

            <label for="email">
                Email:
                <input type="email">
            </label><br>
        </div>
        <br>
        <div>

            <label for="password">
                password:
                <input type="password" required> 
            </label><br>
        </div>
        <br>
        <div>
        <label for="password">confirm password:
            <input type="password" required>
        </label>
        </div>
        <br>
        <div>

            <label for="date">
                date:
                <input type="date">
            </label>
        </div>
        <br>
        <div>
            <label for="country">
                your country:
               <select name="country" required>
<option value="india">india</option>
<option value="nepal">nepal</option>
<opition value="china">china</opition>
<option value="pakistan">pakistan</option>
<option value="bhutan">bhutan</option>               
</select>
            </label></div>
            <br>
            <div>

                <label for="bio">your short introduction
                    <textarea rows="6" cols="33"></textarea>
                </label>
        </div>
        <br>
        <div>
            <label for="terms"><b><i>i accept this terms and condition</i></b>
                <input type="checkbox" required>
            </label>
        </div>
        <br>
        <div>
            <label for="submit">
                <button type="submit"> click here to submit your responses</button>
            </label>
        </div>
        <br>
        <div>
            <label for="reset">
                <button type="reset">click here to reset your reseponses</button>
            </label>
        </div>
    </form>
</body>
</html>
